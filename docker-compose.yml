# Optional: use this if you switch Prisma to provider "mysql" and point DATABASE_URL here.
# Default local setup uses SQLite (prisma/dev.db) — no Docker required.
services:
  mysql:
    image: mysql:8.4
    container_name: ofinit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ofinit_website
      MYSQL_USER: ofinit
      MYSQL_PASSWORD: ofinit_secret
    ports:
      - "3306:3306"
    volumes:
      - ofinit_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  ofinit_mysql_data:
